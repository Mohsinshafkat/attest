<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate – BSTE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f0; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: #124d2b; color: #fff; padding: .75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-brand { font-size: 1.1rem; font-weight: bold; }
    .topbar-brand span { display: block; font-size: .68rem; opacity: .7; }
    .back-link { color: #f5c518; font-size: .85rem; font-weight: bold; text-decoration: none; }
    .download-bar { background: #1a6b3c; padding: .7rem 1.25rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .download-bar p { color: #fff; font-size: .88rem; }
    .btn-dl { background: #f5c518; color: #111; padding: .5rem 1rem; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: .85rem; }
    .pdf-wrap { flex: 1; display: flex; }
    iframe { flex: 1; width: 100%; border: none; background: #525659; }
    .error-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .error-box { background: #fff; padding: 2.5rem; border-radius: 8px; text-align: center; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .btn-back { display: inline-block; margin-top: 1rem; background: #1a6b3c; color: #fff; padding: .6rem 1.2rem; border-radius: 5px; text-decoration: none; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">BSTE <span>Board of Science & Technology Education</span></div>
    <a href="verification.html" class="back-link">← Back to Verification</a>
  </div>

  <div id="pdfSection" class="pdf-wrap" style="display:none;">
    <div class="download-bar" style="position: absolute; width: 100%; top: 60px; z-index: 10;">
      <p>Roll No: <strong id="rollLabel" style="color:#f5c518"></strong></p>
      <a id="downloadBtn" href="#" download class="btn-dl">Download PDF</a>
    </div>
    <iframe id="pdfFrame" src=""></iframe>
  </div>

  <div id="errorSection" class="error-wrap" style="display:none;">
    <div class="error-box">
      <h2 id="errorTitle" style="color:#c0392b">Record Not Found</h2>
      <p id="errorMsg" style="margin: 1rem 0; color:#666;">Details provided do not match our records.</p>
      <a href="verification.html" class="btn-back">Go Back</a>
    </div>
  </div>

  <script>
    const STUDENTS = { '90625_2023': true, '12345_2023': true, '12346_2024': true };

    function showError(title, msg) {
      document.getElementById('pdfSection').style.display = 'none';
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorSection').style.display = 'flex';
    }

    const params = new URLSearchParams(window.location.search);
    const roll = (params.get('roll') || '').trim();
    const year = (params.get('year') || '').trim();

    if (!roll || !year || !STUDENTS[roll + '_' + year]) {
      showError('Record Not Found', 'Verification failed. Please check your Roll Number and Year.');
    } else {
      // Path: Students/Pdf/DAE-EL90625.pdf
      const pdfFile = 'Students/Pdf/DAE-EL' + roll + '.pdf';
      
      fetch(pdfFile, { method: 'HEAD' }).then(res => {
        if (!res.ok) throw new Error();
        document.getElementById('pdfSection').style.display = 'block';
        document.getElementById('rollLabel').textContent = 'DAE-EL' + roll;
        document.getElementById('pdfFrame').src = pdfFile;
        document.getElementById('downloadBtn').href = pdfFile;
      }).catch(() => {
        showError('File Error', 'Certificate file (DAE-EL' + roll + '.pdf) is missing in Students/Pdf/ folder.');
      });
    }
  </script>
</body>
</html>
