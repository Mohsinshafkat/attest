<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate – BSTE</title>
  <style>
    /* Full Screen Setup */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Scrollbar ko khatam karne ke liye */
    }
    
    body {
      font-family: Arial, sans-serif;
      background: #525659; /* PDF viewer jaisa professional dark background */
      display: flex;
      flex-direction: column;
    }

    /* Top bar fixed height */
    .topbar {
      background: #124d2b;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      flex-shrink: 0;
      z-index: 100;
    }
    .topbar-brand { font-size: 1.1rem; font-weight: bold; }
    .topbar-brand span { display: block; font-size: .65rem; opacity: 0.8; text-transform: uppercase; }
    .back-link { color: #f5c518; font-size: 0.85rem; font-weight: bold; text-decoration: none; }

    /* Download bar fixed height */
    .download-bar {
      background: #1a6b3c;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 50px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .download-bar p { color: #fff; margin: 0; font-size: 0.9rem; }
    .btn-dl { 
      background: #f5c518; 
      color: #111; 
      padding: 6px 15px; 
      border-radius: 4px; 
      text-decoration: none; 
      font-weight: bold; 
      font-size: 0.85rem; 
    }

    /* PDF Section: Baki bachi hui poori screen occupy karega */
    .pdf-wrap {
      flex-grow: 1; 
      display: flex;
      flex-direction: column;
      width: 100%;
      height: calc(100vh - 110px); /* Total height minus (topbar + downloadbar) */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Error Centering */
    .error-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f0;
    }
    .error-box {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 400px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">BSTE <span>Board of Science & Technology Education</span></div>
    <a href="verification.html" class="back-link">← Back</a>
  </div>

  <div id="pdfSection" class="pdf-wrap" style="display:none;">
    <div class="download-bar">
      <p>Roll No: <strong id="rollLabel" style="color:#f5c518"></strong> — Certificate</p>
      <a id="downloadBtn" href="#" download class="btn-dl">Download PDF</a>
    </div>
    <iframe id="pdfFrame" src=""></iframe>
  </div>

  <div id="errorSection" class="error-wrap" style="display:none;">
    <div class="error-box">
      <h2 id="errorTitle" style="color:#c0392b; margin-bottom:10px;">Not Found</h2>
      <p id="errorMsg" style="color:#666; margin-bottom:20px;">Details do not match.</p>
      <a href="verification.html" class="btn-dl" style="display:inline-block; text-align:center;">Go Back</a>
    </div>
  </div>

  <script>
    const STUDENTS = { '90625_2023': true, '12345_2023': true, '12346_2024': true };

    function showError(title, msg) {
      document.getElementById('pdfSection').style.display = 'none';
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorSection').style.display = 'flex';
    }

    const params = new URLSearchParams(window.location.search);
    const roll = (params.get('roll') || '').trim();
    const year = (params.get('year') || '').trim();

    if (!roll || !year || !STUDENTS[roll + '_' + year]) {
      showError('Record Not Found', 'Aapka record database mein nahi mila.');
    } else {
      // Path logic
      const folderPath = 'Students/Pdf/';
      const fileName = 'DAE-EL' + roll + '.pdf';
      const pdfFile = folderPath + fileName;
      
      // GitHub check
      fetch(pdfFile, { method: 'HEAD' }).then(res => {
        if (!res.ok) throw new Error();
        
        document.getElementById('errorSection').style.display = 'none';
        document.getElementById('pdfSection').style.display = 'flex';
        document.getElementById('rollLabel').textContent = 'DAE-EL' + roll;
        document.getElementById('pdfFrame').src = pdfFile;
        document.getElementById('downloadBtn').href = pdfFile;
        
      }).catch(() => {
        showError('File Not Found', 'PDF file (' + fileName + ') folder mein nahi mili.');
      });
    }
  </script>
</body>
</html>
